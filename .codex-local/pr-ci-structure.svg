<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <style>
      .bg { fill: #f7f4ee; }
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #4b5563; }
      .box-title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .box-text { font: 14px Arial, sans-serif; fill: #1f2937; }
      .small { font: 13px Arial, sans-serif; fill: #374151; }
      .swim-title { font: 700 20px Arial, sans-serif; fill: #111827; }
      .box { rx: 14; ry: 14; stroke: #374151; stroke-width: 2; }
      .gate { fill: #dbeafe; }
      .build { fill: #dcfce7; }
      .matrix { fill: #fef3c7; }
      .compare { fill: #fce7f3; }
      .cuda { fill: #ede9fe; }
      .lane { fill: none; stroke: #d1d5db; stroke-width: 2; stroke-dasharray: 8 8; }
      .arrow { stroke: #4b5563; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>
  <text class="title" x="40" y="48">PR / Branch Push CI Structure</text>
  <text class="subtitle" x="40" y="76">Recommended shape: keep exact matrix in PR CI, move MT-Bench behavior to nightly / release workflows.</text>

  <line class="lane" x1="30" y1="120" x2="1470" y2="120"/>
  <line class="lane" x1="30" y1="350" x2="1470" y2="350"/>
  <line class="lane" x1="30" y1="690" x2="1470" y2="690"/>

  <text class="swim-title" x="40" y="112">Trigger + Foundation</text>
  <text class="swim-title" x="40" y="342">Platform / Flavor Jobs</text>
  <text class="swim-title" x="40" y="682">Exact Matrix + Baseline Gate</text>

  <rect class="box gate" x="50" y="150" width="250" height="90"/>
  <text class="box-title" x="70" y="182">PR / Branch Push</text>
  <text class="box-text" x="70" y="210">pull_request</text>
  <text class="box-text" x="70" y="232">push (branches / main)</text>

  <rect class="box gate" x="370" y="150" width="260" height="90"/>
  <text class="box-title" x="390" y="182">changes</text>
  <text class="box-text" x="390" y="210">paths-filter</text>
  <text class="box-text" x="390" y="232">decides which job groups run</text>

  <line class="arrow" x1="300" y1="195" x2="370" y2="195"/>

  <rect class="box build" x="70" y="390" width="300" height="220"/>
  <text class="box-title" x="90" y="422">linux-foundation</text>
  <text class="small" x="90" y="452">ubuntu-latest</text>
  <text class="box-text" x="90" y="482">• UI build</text>
  <text class="box-text" x="90" y="507">• Python deps</text>
  <text class="box-text" x="90" y="532">• Rust unit tests</text>
  <text class="box-text" x="90" y="557">• mesh-llm release build</text>
  <text class="box-text" x="90" y="582">• llama.cpp CPU/RPC build</text>
  <text class="box-text" x="90" y="607">• compat / split / client-auto / CLI smokes</text>

  <rect class="box build" x="440" y="390" width="300" height="220"/>
  <text class="box-title" x="460" y="422">macos-foundation</text>
  <text class="small" x="460" y="452">macos-latest</text>
  <text class="box-text" x="460" y="482">• UI build</text>
  <text class="box-text" x="460" y="507">• Rust unit tests</text>
  <text class="box-text" x="460" y="532">• mesh-llm release build</text>
  <text class="box-text" x="460" y="557">• llama.cpp macOS/RPC build</text>
  <text class="box-text" x="460" y="582">• basic macOS smokes</text>
  <text class="box-text" x="460" y="607">• upload macOS binaries</text>

  <rect class="box cuda" x="810" y="390" width="300" height="220"/>
  <text class="box-title" x="830" y="422">linux-cuda-build</text>
  <text class="small" x="830" y="452">ubuntu-latest in CUDA container</text>
  <text class="box-text" x="830" y="482">• CUDA flavor compile confidence</text>
  <text class="box-text" x="830" y="507">• build UI</text>
  <text class="box-text" x="830" y="532">• Rust build</text>
  <text class="box-text" x="830" y="557">• llama.cpp CUDA build</text>
  <text class="box-text" x="830" y="582">• catches CUDA-specific breakage</text>

  <line class="arrow" x1="500" y1="240" x2="220" y2="390"/>
  <line class="arrow" x1="500" y1="240" x2="590" y2="390"/>
  <line class="arrow" x1="500" y1="240" x2="960" y2="390"/>

  <rect class="box matrix" x="70" y="730" width="300" height="180"/>
  <text class="box-title" x="90" y="762">gguf-exact-matrix</text>
  <text class="small" x="90" y="790">runs from linux binaries</text>
  <text class="box-text" x="90" y="820">• Qwen2.5</text>
  <text class="box-text" x="90" y="843">• Qwen3</text>
  <text class="box-text" x="90" y="866">• JOSIE</text>
  <text class="box-text" x="90" y="889">• Llama 3.2 / Gemma / GLM / LFM2</text>

  <rect class="box matrix" x="440" y="730" width="300" height="180"/>
  <text class="box-title" x="460" y="762">mlx-exact-matrix</text>
  <text class="small" x="460" y="790">runs from macOS binaries</text>
  <text class="box-text" x="460" y="820">• Qwen2.5</text>
  <text class="box-text" x="460" y="843">• Qwen3</text>
  <text class="box-text" x="460" y="866">• JOSIE</text>
  <text class="box-text" x="460" y="889">• Llama 3.2 / Gemma / GLM / LFM2</text>

  <rect class="box compare" x="980" y="730" width="360" height="180"/>
  <text class="box-title" x="1000" y="762">Exact Baseline Gate</text>
  <text class="box-text" x="1000" y="792">• compare GGUF exact to checked-in GGUF baseline</text>
  <text class="box-text" x="1000" y="817">• compare MLX exact to checked-in MLX baseline</text>
  <text class="box-text" x="1000" y="842">• compare MLX exact to canonical GGUF baseline</text>
  <text class="box-text" x="1000" y="867">• fail PR on exact regressions / parity breaks</text>

  <line class="arrow" x1="220" y1="610" x2="220" y2="730"/>
  <line class="arrow" x1="590" y1="610" x2="590" y2="730"/>
  <line class="arrow" x1="370" y1="820" x2="980" y2="820"/>
  <line class="arrow" x1="740" y1="820" x2="980" y2="820"/>

  <text class="subtitle" x="40" y="950">Behavior / MT-Bench jobs should move out of PR CI into nightly / release validation.</text>
</svg>
